<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B9EF5"/>
      <stop offset="100%" stop-color="#00CFFF"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Circle with gap at bottom-left (orbit arc feel) -->
  <path
    d="M50 8 A42 42 0 1 1 18 72"
    stroke="url(#grad)"
    stroke-width="4"
    stroke-linecap="round"
    filter="url(#glow)"
  />

  <!-- Letter M -->
  <path
    d="M28 68 L28 35 L50 58 L72 35 L72 68"
    stroke="url(#grad)"
    stroke-width="4.5"
    stroke-linecap="round"
    stroke-linejoin="round"
    filter="url(#glow)"
  />
</svg>
